apiVersion: v1
kind: Service
metadata:
  name: lab6-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: lab6-web-app
    component: backend
    {{- include "lab6-web-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: lab6-web-app
    component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: 8000
      {{- if eq .Values.backend.service.type "NodePort" }}
      nodePort: {{ .Values.backend.service.nodePort }}
      {{- end }}
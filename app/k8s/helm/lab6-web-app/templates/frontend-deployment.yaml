apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab6-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: lab6-web-app
    component: frontend
    {{- include "lab6-web-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: lab6-web-app
      component: frontend
  template:
    metadata:
      labels:
        app: lab6-web-app
        component: frontend
        {{- include "lab6-web-app.labels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: frontend-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: frontend-config
          configMap:
            name: lab6-app-config
            items:
              - key: config.js
                path: config.js
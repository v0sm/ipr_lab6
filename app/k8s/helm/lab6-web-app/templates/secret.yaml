{{- $built := printf "postgres://%s:%s@%s:%d/%s?sslmode=disable" .Values.database.user .Values.database.password .Values.database.host (int .Values.database.port) .Values.database.name -}}
{{- $databaseUrl := .Values.database.url | default $built -}}
apiVersion: v1
kind: Secret
metadata:
  name: lab6-app-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lab6-web-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  demo-api-key: {{ .Values.secrets.demoApiKey | quote }}
  database-url: {{ $databaseUrl | quote }}
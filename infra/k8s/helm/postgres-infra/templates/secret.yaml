apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres-infra.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-infra.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.password | quote }}
  username: {{ .Values.auth.username | quote }}
  database: {{ .Values.auth.database | quote }}